<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book a Session</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #14120f;
    --bg-raised: #1c1a16;
    --ink: #f2ede4;
    --ink-dim: #b6afa2;
    --accent: #c9a227;
    --accent-dim: #7a6a2c;
    --line: #322e26;
    --busy: #4a3a3a;
    --available: #2e3a2c;
    --radius: 2px;
    --serif: 'Fraunces', serif;
    --sans: 'Inter', sans-serif;
  }
  *{ box-sizing: border-box; }
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family: var(--sans); line-height:1.5;
  }
  .sprockets{
    display:flex; justify-content:space-between; padding: 6px 24px;
    opacity:.35;
  }
  .sprockets span{ width:8px; height:8px; border-radius:50%; background: var(--ink-dim); }
  header.hero{
    padding: 72px 24px 48px; text-align:center; border-bottom:1px solid var(--line);
  }
  .eyebrow{
    font-family: var(--sans); text-transform:uppercase; letter-spacing:.22em;
    font-size:11px; color:var(--accent); margin-bottom:14px;
  }
  h1{
    font-family: var(--serif); font-weight:600; font-size: clamp(32px, 6vw, 56px);
    margin: 0 0 12px; letter-spacing:-0.01em;
  }
  .sub{ color:var(--ink-dim); max-width:520px; margin:0 auto; font-size:15px; }

  main{ max-width: 960px; margin: 0 auto; padding: 56px 24px 96px; }
  section{ margin-bottom: 64px; }
  h2{
    font-family: var(--serif); font-weight:600; font-size:24px; margin: 0 0 24px;
    display:flex; align-items:center; gap:12px;
  }
  h2 .num{ color:var(--accent-dim); font-size:14px; font-family: var(--sans); }

  #packages{
    display:grid; grid-template-columns: repeat(auto-fill, minmax(240px,1fr)); gap:16px;
  }
  .pkg{
    background:var(--bg-raised); border:1px solid var(--line); border-radius:var(--radius);
    padding:22px; cursor:pointer; transition: border-color .15s, transform .15s;
  }
  .pkg:hover{ border-color: var(--accent-dim); transform: translateY(-2px); }
  .pkg.selected{ border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .pkg h3{ font-family: var(--serif); font-size:19px; margin:0 0 6px; }
  .pkg .meta{ color:var(--ink-dim); font-size:13px; margin-bottom:10px; }
  .pkg .desc{ font-size:14px; color:var(--ink-dim); margin-bottom:14px; }
  .pkg .price{ font-family: var(--serif); font-size:20px; color: var(--accent); }

  #calendarSection{ display:none; }
  .cal-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .cal-head button{
    background:none; border:1px solid var(--line); color:var(--ink); border-radius: var(--radius);
    padding:6px 12px; cursor:pointer; font-family: var(--sans);
  }
  .cal-head button:hover{ border-color: var(--accent); }
  .cal-month{ font-family: var(--serif); font-size:18px; }
  .cal-grid{ display:grid; grid-template-columns: repeat(7, 1fr); gap:6px; }
  .cal-dow{ text-align:center; font-size:11px; color:var(--ink-dim); text-transform:uppercase; letter-spacing:.08em; padding-bottom:6px;}
  .cal-day{
    aspect-ratio: 1; display:flex; align-items:center; justify-content:center;
    border-radius: var(--radius); font-size:14px; cursor:pointer; border:1px solid transparent;
    background: var(--bg-raised); color: var(--ink-dim);
  }
  .cal-day.empty{ background:none; cursor:default; }
  .cal-day.available{ color: var(--ink); border-color: var(--line); }
  .cal-day.available:hover{ border-color: var(--accent); }
  .cal-day.full{ color: #6b5f5f; text-decoration: line-through; cursor:not-allowed; }
  .cal-day.past{ opacity:.25; cursor:not-allowed; }
  .cal-day.selected{ background: var(--accent); color: #14120f; }

  #slots{ display:flex; flex-wrap:wrap; gap:10px; margin-top:20px; }
  .slot{
    background:var(--bg-raised); border:1px solid var(--line); color:var(--ink);
    padding:9px 16px; border-radius: var(--radius); cursor:pointer; font-family: var(--sans); font-size:14px;
  }
  .slot:hover{ border-color: var(--accent); }
  .slot.selected{ background: var(--accent); color:#14120f; border-color:var(--accent); }

  #formSection{ display:none; }
  form{ display:grid; gap:14px; max-width: 480px; }
  label{ font-size:13px; color: var(--ink-dim); display:block; margin-bottom:6px; }
  input, textarea{
    width:100%; background: var(--bg-raised); border:1px solid var(--line); color: var(--ink);
    padding:11px 12px; border-radius: var(--radius); font-family: var(--sans); font-size:14px;
  }
  input:focus, textarea:focus{ outline:none; border-color: var(--accent); }
  textarea{ resize: vertical; min-height:70px; }
  .summary{
    background: var(--bg-raised); border:1px solid var(--line); border-radius:var(--radius);
    padding:16px; font-size:14px; color: var(--ink-dim); margin-bottom: 6px;
  }
  .summary b{ color: var(--ink); }
  button.submit{
    background: var(--accent); color:#14120f; border:none; padding:14px; border-radius: var(--radius);
    font-family: var(--sans); font-weight:600; font-size:15px; cursor:pointer; margin-top:6px;
  }
  button.submit:hover{ background:#dfb639; }
  button.submit:disabled{ background: var(--line); color: var(--ink-dim); cursor:not-allowed; }

  #confirmation{ display:none; text-align:center; padding: 40px 24px; }
  #confirmation h2{ justify-content:center; }
  .error{ color:#e08a8a; font-size:14px; margin-top:8px; }
  .hint{ font-size:12px; color:var(--ink-dim); margin-top:8px; }
</style>
</head>
<body>

<div class="sprockets">
  <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
</div>

<header class="hero">
  <div class="eyebrow">Book a session</div>
  <h1>Let's make something worth keeping.</h1>
  <p class="sub">Pick a package, choose a date that works for you, and lock it in — no back and forth needed.</p>
</header>

<main>
  <section>
    <h2><span class="num">01</span> Choose a package</h2>
    <div id="packages">Loading packages…</div>
  </section>

  <section id="calendarSection">
    <h2><span class="num">02</span> Pick a date</h2>
    <div class="cal-head">
      <button id="prevMonth">← Prev</button>
      <div class="cal-month" id="calMonthLabel"></div>
      <button id="nextMonth">Next →</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
    <div id="slots"></div>
  </section>

  <section id="formSection">
    <h2><span class="num">03</span> Your details</h2>
    <div class="summary" id="summary"></div>
    <form id="bookingForm">
      <div>
        <label for="name">Full name</label>
        <input type="text" id="name" required>
      </div>
      <div>
        <label for="email">Email</label>
        <input type="email" id="email" required>
      </div>
      <div>
        <label for="phone">Phone</label>
        <input type="tel" id="phone">
      </div>
      <div>
        <label for="notes">Anything I should know? (location ideas, occasion, etc.)</label>
        <textarea id="notes"></textarea>
      </div>
      <button type="submit" class="submit" id="submitBtn">Confirm booking</button>
      <div class="error" id="formError"></div>
    </form>
  </section>

  <section id="confirmation">
    <h2>You're booked ✔</h2>
    <p class="sub" id="confMsg"></p>
  </section>
</main>

<script>
/* ============================================================
   CONFIG — paste the Web App URL you get from Apps Script here
   ============================================================ */
const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbwShuc1BMKwJEorjZ-fUJaVn3QT0ciqsRoLrUhHWDsg4J8aWqjU5feQEeooFWi9L_ejWA/exec';

let packages = [];
let selectedPackage = null;
let viewMonth = new Date();
let selectedDate = null;
let selectedTime = null;
let monthAvailability = {};

const dow = ['Su','Mo','Tu','We','Th','Fr','Sa'];

async function api(action, params = {}) {
  const url = new URL(WEBAPP_URL);
  url.searchParams.set('action', action);
  Object.entries(params).forEach(([k,v]) => url.searchParams.set(k, v));
  const res = await fetch(url);
  return res.json();
}

async function post(data) {
  const res = await fetch(WEBAPP_URL, { method: 'POST', body: JSON.stringify(data) });
  return res.json();
}

async function loadPackages() {
  const el = document.getElementById('packages');
  try {
    const data = await api('packages');
    if (!data.ok) throw new Error(data.error);
    packages = data.packages;
    el.innerHTML = '';
    packages.forEach(p => {
      const card = document.createElement('div');
      card.className = 'pkg';
      card.innerHTML = `
        <h3>${p.name}</h3>
        <div class="meta">${p.durationMinutes} min</div>
        <div class="desc">${p.description || ''}</div>
        <div class="price">${p.price || ''}</div>
      `;
      card.onclick = () => selectPackage(p, card);
      el.appendChild(card);
    });
  } catch (err) {
    el.innerHTML = '<div class="error">Could not load packages. ' + err.message + '</div>';
  }
}

function selectPackage(pkg, cardEl) {
  selectedPackage = pkg;
  document.querySelectorAll('.pkg').forEach(c => c.classList.remove('selected'));
  cardEl.classList.add('selected');
  document.getElementById('calendarSection').style.display = 'block';
  document.getElementById('formSection').style.display = 'none';
  selectedDate = null; selectedTime = null;
  document.getElementById('slots').innerHTML = '';
  renderCalendar();
  document.getElementById('calendarSection').scrollIntoView({behavior:'smooth'});
}

async function renderCalendar() {
  const y = viewMonth.getFullYear();
  const m = viewMonth.getMonth();
  const monthStr = y + '-' + String(m+1).padStart(2,'0');
  document.getElementById('calMonthLabel').textContent =
    viewMonth.toLocaleString('default', { month: 'long', year: 'numeric' });

  const grid = document.getElementById('calGrid');
  grid.innerHTML = dow.map(d => `<div class="cal-dow">${d}</div>`).join('');

  const data = await api('month', { month: monthStr, duration: selectedPackage.durationMinutes });
  monthAvailability = data.ok ? data.days : {};

  const firstDay = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const today = new Date(); today.setHours(0,0,0,0);

  for (let i=0; i<firstDay; i++) {
    grid.innerHTML += '<div class="cal-day empty"></div>';
  }
  for (let d=1; d<=daysInMonth; d++) {
    const dateStr = monthStr + '-' + String(d).padStart(2,'0');
    const dateObj = new Date(y, m, d);
    const count = monthAvailability[dateStr] || 0;
    let cls = 'cal-day';
    if (dateObj < today) cls += ' past';
    else if (count > 0) cls += ' available';
    else cls += ' full';
    const cell = document.createElement('div');
    cell.className = cls;
    cell.textContent = d;
    if (cls.includes('available')) {
      cell.onclick = () => selectDate(dateStr, cell);
    }
    grid.appendChild(cell);
  }
}

async function selectDate(dateStr, cellEl) {
  selectedDate = dateStr;
  document.querySelectorAll('.cal-day').forEach(c => c.classList.remove('selected'));
  cellEl.classList.add('selected');
  const slotsEl = document.getElementById('slots');
  slotsEl.innerHTML = 'Loading times…';
  const data = await api('slots', { date: dateStr, duration: selectedPackage.durationMinutes });
  if (!data.ok || data.slots.length === 0) {
    slotsEl.innerHTML = '<div class="hint">No times left that day — pick another date.</div>';
    return;
  }
  slotsEl.innerHTML = '';
  data.slots.forEach(t => {
    const btn = document.createElement('div');
    btn.className = 'slot';
    btn.textContent = formatTime(t);
    btn.onclick = () => selectTime(t, btn);
    slotsEl.appendChild(btn);
  });
}

function formatTime(t) {
  const [h,m] = t.split(':').map(Number);
  const ampm = h >= 12 ? 'PM' : 'AM';
  const h12 = h % 12 === 0 ? 12 : h % 12;
  return `${h12}:${String(m).padStart(2,'0')} ${ampm}`;
}

function selectTime(t, btnEl) {
  selectedTime = t;
  document.querySelectorAll('.slot').forEach(s => s.classList.remove('selected'));
  btnEl.classList.add('selected');
  showForm();
}

function showForm() {
  const formSection = document.getElementById('formSection');
  formSection.style.display = 'block';
  document.getElementById('summary').innerHTML = `
    <b>${selectedPackage.name}</b><br>
    ${new Date(selectedDate + 'T00:00:00').toLocaleDateString('default', {weekday:'long', month:'long', day:'numeric', year:'numeric'})}
    at ${formatTime(selectedTime)}
  `;
  formSection.scrollIntoView({behavior:'smooth'});
}

document.getElementById('prevMonth').onclick = () => {
  viewMonth.setMonth(viewMonth.getMonth() - 1);
  renderCalendar();
};
document.getElementById('nextMonth').onclick = () => {
  viewMonth.setMonth(viewMonth.getMonth() + 1);
  renderCalendar();
};

document.getElementById('bookingForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const errEl = document.getElementById('formError');
  errEl.textContent = '';
  btn.disabled = true;
  btn.textContent = 'Booking…';

  const payload = {
    packageId: selectedPackage.id,
    date: selectedDate,
    time: selectedTime,
    name: document.getElementById('name').value,
    email: document.getElementById('email').value,
    phone: document.getElementById('phone').value,
    notes: document.getElementById('notes').value,
  };

  try {
    const res = await post(payload);
    if (!res.ok) throw new Error(res.error || 'Something went wrong');
    document.querySelectorAll('section').forEach(s => s.style.display = 'none');
    const conf = document.getElementById('confirmation');
    conf.style.display = 'block';
    document.getElementById('confMsg').textContent =
      `${res.package} confirmed for ${new Date(res.date + 'T00:00:00').toLocaleDateString('default',{weekday:'long', month:'long', day:'numeric'})} at ${formatTime(res.time)}. A calendar invite is on its way to your email.`;
    conf.scrollIntoView({behavior:'smooth'});
  } catch (err) {
    errEl.textContent = err.message;
    btn.disabled = false;
    btn.textContent = 'Confirm booking';
  }
});

loadPackages();
</script>
</body>
</html>
